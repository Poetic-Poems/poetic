name: Release

# Triggered by a push to main that changes package.json (normally a
# "chore: release vX.Y.Z" commit bumping the version field). package.json's
# version is the single source of truth: this workflow tags the commit that
# introduced it and publishes the GitHub release, so the tag can never drift
# out of sync with the version the commit itself is bumping to.
on:
  push:
    branches:
      - main
    paths:
      - package.json

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already tagged
        id: check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag this commit
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Poetic ${{ steps.version.outputs.tag }}" \
            --generate-notes

      # Attach an `npm pack` tarball as an immutable release asset so consumers
      # can depend on `.../releases/download/<tag>/poetic-<version>.tgz` instead
      # of a git URL. Registry-style tarball deps are exempt from npm's
      # EALLOWGIT rule (npm 11.x/12.x refuse to fetch git-type deps), and asset
      # bytes are immutable — unlike GitHub's auto-generated source archives,
      # whose checksums are not guaranteed stable. The `files` whitelist in
      # package.json keeps the tarball to what the `exports` map needs.
      - name: Attach npm-pack tarball to the release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(node -p "require('./package.json').version")
          npm pack
          gh release upload "${{ steps.version.outputs.tag }}" "poetic-${version}.tgz"
