name: Commit message format

# CI backstop for Conventional Commits (see README.md's "Commit messages"
# section). The local .githooks/commit-msg hook catches this too, but it is
# opt-in per clone (`git config core.hooksPath .githooks`), so this job
# re-checks every commit on the pull request regardless of whether the
# author enabled it. Deliberately not gated by `paths:` — commit hygiene
# applies to every PR, not just ones touching build tooling — and
# deliberately `pull_request` (not `pull_request_target`), so a fork PR never
# runs with write-scoped secrets.
#
# Both this job and the local hook call .githooks/check-commit-format.sh, so
# the Conventional Commits pattern itself lives in exactly one place.

on:
  pull_request:

permissions:
  contents: read

jobs:
  commit-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate commit messages against Conventional Commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          status=0
          while IFS= read -r subject; do
            [ -n "$subject" ] || continue
            if ! bash .githooks/check-commit-format.sh "$subject"; then
              status=1
            fi
          done < <(git log --format=%s "${BASE_SHA}..${HEAD_SHA}")
          exit "$status"
